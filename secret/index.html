<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>INKY'D</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;

      background-image: url("Inky-style.gif");
      background-repeat: repeat;
      background-size: 196px auto;
      background-position: top left;
    }

    .wrap {
      position: absolute;
      top: 35%;
      left: 20%;
    }

    .layer {
      position: absolute;
      font-family: Impact, Arial Black, sans-serif;
      white-space: nowrap;
      color: black;
      line-height: 0.9;
    }

    .main {
      font-size: 90px;
      z-index: 10;
    }

    /* tight stack */
    .l1 { font-size: 90px; opacity: 1;    transform: translate(0px, 0px); }

    .l2 { font-size: 78px; opacity: 0.80; transform: translate(6px, -12px); color: #222; }
    .l3 { font-size: 66px; opacity: 0.65; transform: translate(12px, -24px); color: #444; }
    .l4 { font-size: 56px; opacity: 0.50; transform: translate(18px, -36px); color: #555; }
    .l5 { font-size: 48px; opacity: 0.38; transform: translate(24px, -48px); color: #666; }
    .l6 { font-size: 40px; opacity: 0.28; transform: translate(30px, -60px); color: #777; }
    .l7 { font-size: 34px; opacity: 0.18; transform: translate(36px, -72px); color: #888; }
    .l8 { font-size: 28px; opacity: 0.10; transform: translate(42px, -84px); color: #999; }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="layer l1 main">YOU JUST GOT<br>INKY'D!</div>

    <div class="layer l2">YOU JUST GOT<br>INKY'D!</div>
    <div class="layer l3">YOU JUST GOT<br>INKY'D!</div>
    <div class="layer l4">YOU JUST GOT<br>INKY'D!</div>
    <div class="layer l5">YOU JUST GOT<br>INKY'D!</div>
    <div class="layer l6">YOU JUST GOT<br>INKY'D!</div>
    <div class="layer l7">YOU JUST GOT<br>INKY'D!</div>
    <div class="layer l8">YOU JUST GOT<br>INKY'D!</div>

  </div>

</body>
</html>
