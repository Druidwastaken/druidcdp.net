<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>INKY'D</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url("Inky-style.gif");
      background-repeat: repeat;
      background-size: 96px auto;
    }

    .main {
      position: absolute;
      top: 55px;
      left: 55px;
      font-family: Impact, Arial Black, sans-serif;
      font-size: 78px;
      line-height: 0.9;
      color: black;
      z-index: 10;
      white-space: nowrap;
    }

    .trail {
      position: absolute;
      font-family: Impact, Arial Black, sans-serif;
      white-space: nowrap;
      color: black;
      pointer-events: none;
      user-select: none;
    }

    .t1 { top: 55px;  left: 55px;  font-size: 78px; opacity: 1;   color: black; }
    .t2 { top: 15px;  left: 40px;  font-size: 64px; opacity: 0.75; color: #444; }
    .t3 { top: -25px; left: 25px;  font-size: 52px; opacity: 0.55; color: #666; }
    .t4 { top: -65px; left: 10px;  font-size: 42px; opacity: 0.35; color: #888; }
    .t5 { top: -100px; left: -5px; font-size: 34px; opacity: 0.20; color: #aaa; }
  </style>
</head>
<body>

  <div class="main">YOU JUST GOT<br>INKY'D!</div>

  <div class="trail t2">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t3">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t4">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t5">YOU JUST GOT<br>INKY'D!</div>

</body>
</html>
