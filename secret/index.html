<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>INKY'D</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;

      /* slightly larger tiles */
      background-image: url("Inky-style.gif");
      background-repeat: repeat;
      background-size: 140px 140px;
    }

    /* main text (closer to center, but still offset) */
    .main {
      position: absolute;
      top: 35%;
      left: 38%;

      font-family: Impact, Arial Black, sans-serif;
      font-size: 90px;
      line-height: 0.9;
      color: black;
      z-index: 10;
      white-space: nowrap;
    }

    .trail {
      position: absolute;
      font-family: Impact, Arial Black, sans-serif;
      white-space: nowrap;
      color: black;
      pointer-events: none;
      user-select: none;
    }

    /* stacked echo copies */
    .t1  { top: 35%; left: 38%; font-size: 90px; opacity: 1.00; color: black; }

    .t2  { top: 30%; left: 35%; font-size: 78px; opacity: 0.80; color: #222; }
    .t3  { top: 25%; left: 32%; font-size: 66px; opacity: 0.65; color: #444; }
    .t4  { top: 20%; left: 29%; font-size: 56px; opacity: 0.50; color: #555; }
    .t5  { top: 15%; left: 26%; font-size: 48px; opacity: 0.38; color: #666; }
    .t6  { top: 10%; left: 23%; font-size: 40px; opacity: 0.28; color: #777; }
    .t7  { top: 5%;  left: 20%; font-size: 34px; opacity: 0.18; color: #888; }
    .t8  { top: 0%;  left: 17%; font-size: 28px; opacity: 0.10; color: #999; }
  </style>
</head>

<body>

  <div class="main">YOU JUST GOT<br>INKY'D!</div>

  <div class="trail t2">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t3">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t4">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t5">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t6">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t7">YOU JUST GOT<br>INKY'D!</div>
  <div class="trail t8">YOU JUST GOT<br>INKY'D!</div>

</body>
</html>
