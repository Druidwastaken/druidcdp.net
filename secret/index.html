<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're the dog now man!</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Impact, Arial Black, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #clickToStart {
      text-align: center;
      font-size: 2em;
      padding: 20px;
      line-height: 1.4;
    }

    #ytmnd {
      width: 100%;
      height: 100%;
      background-image: url("Inky-style.gif");
      background-repeat: repeat;
      background-size: 196px auto;
      background-position: top left;
      display: none;
      position: relative;
    }

    #text div {
      position: absolute;
      white-space: nowrap;
      line-height: 0.9;
      color: black;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="clickToStart">
    you don't want to know.<br>
    such grievous information one click away...
  </div>

  <div id="ytmnd">
    <div id="text">
      <!-- YOUR "YOU JUST GOT" AND "INKY'D!" DIVS GO HERE -->
    </div>
  </div>

  <audio id="music" loop>
    <source src="inky.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("music");
    const clickDiv = document.getElementById("clickToStart");
    const ytmnd = document.getElementById("ytmnd");

    clickDiv.addEventListener("click", () => {
      // Hide the click message
      clickDiv.style.display = "none";

      // Show the main content
      ytmnd.style.display = "block";

      // Play music
      music.volume = 0.7;
      music.play().catch(err => {
        console.error("Music failed to play:", err);
      });
    });
  </script>

</body>
</html>
