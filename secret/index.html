<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>INKY'D</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;

      /* tiled background */
      background-image: url("Inky-style.gif");
      background-repeat: repeat;
      background-size: 120px 120px;
    }

    /* main text (front) */
    .main {
      position: absolute;
      top: 40px;
      left: 40px;

      font-family: Impact, Arial Black, sans-serif;
      font-size: 80px;
      color: black;
      line-height: 0.9;
      z-index: 10;
    }

    /* trailing text layers */
    .trail {
      position: absolute;
      top: 0;
      left: 0;

      font-family: Impact, Arial Black, sans-serif;
      font-size: 80px;
      color: black;
      opacity: 0.8;
      transform: scale(1);

      animation: drift 6s linear infinite;
      white-space: nowrap;
    }

    /* make each copy fade + shrink + move upward */
    @keyframes drift {
      0% {
        transform: translate(0px, 0px) scale(1);
        opacity: 0.9;
        filter: brightness(0);
      }
      100% {
        transform: translate(200px, -500px) scale(0.2);
        opacity: 0;
        filter: brightness(3);
      }
    }
  </style>
</head>

<body>

  <!-- main text -->
  <div class="main">
    YOU JUST GOT<br>
    INKY'D!
  </div>

  <!-- trailing echoes -->
  <div class="trail" style="animation-delay: 0s;">YOU JUST GOT INKY'D!</div>
  <div class="trail" style="animation-delay: 1s;">YOU JUST GOT INKY'D!</div>
  <div class="trail" style="animation-delay: 2s;">YOU JUST GOT INKY'D!</div>
  <div class="trail" style="animation-delay: 3s;">YOU JUST GOT INKY'D!</div>
  <div class="trail" style="animation-delay: 4s;">YOU JUST GOT INKY'D!</div>

</body>
</html>
