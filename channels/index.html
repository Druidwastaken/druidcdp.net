<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Druidcdp.net - Channels</title>

  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: black;
      color: #EDAD0B;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    .section {
      margin-bottom: 30px;
    }

    button {
      width: 100%;
      padding: 18px;
      background: transparent;
      border: 2px solid #EDAD0B;
      border-radius: 12px;
      color: #EDAD0B;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: rgba(237, 173, 11, 0.1);
      transform: translateY(-2px);
    }

    .description {
      margin-top: 10px;
      color: #cccccc;
      line-height: 1.5;
      padding-left: 5px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>YOUTUBE CHANNELS</h1>

    <div class="section">
      <button>Druidwastaken</button>
      <div class="description">
        My main channel. Home of animations like ZERO, and some other minor stuff.
      </div>
    </div>

    <div class="section">
      <button>Jonacdp</button>
      <div class="description">
        Channel where I show some techy stuff off, and sometimes blabber *grunt* about things I find interesting.
      </div>
    </div>

    <div class="section">
      <button>Oulum</button>
      <div class="description">
        (Pronounced "ow-l-um") Is a low effort channel that might have some fun stuff on it.
      </div>
    </div>

  </div>
</body>
</html>
