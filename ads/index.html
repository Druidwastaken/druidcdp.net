<!DOCTYPE html>
<html>
<head>
<title>Advertise With Us!</title>

<style>
body {
    background-color: #003366;
    font-family: Verdana, Arial, sans-serif;
    color: white;
    margin: 0;
}

.wrapper {
    width: 760px;
    margin: auto;
    background: #111;
    border: 5px ridge silver;
    padding: 20px;
}

h1 {
    text-align: center;
    color: yellow;
    font-size: 42px;
}

marquee {
    color: lime;
    font-weight: bold;
    margin-bottom: 20px;
}

.form-box {
    background: #222;
    border: 3px dashed cyan;
    padding: 15px;
    margin-top: 20px;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}

input, textarea, select {
    width: 100%;
    background: black;
    color: lime;
    border: 2px inset gray;
    padding: 6px;
    font-family: Courier New;
}

textarea {
    height: 120px;
}

.submit-btn {
    margin-top: 20px;
    background: red;
    color: white;
    border: 3px outset white;
    padding: 10px 20px;
    font-size: 20px;
    cursor: pointer;
}

.submit-btn:hover {
    background: orange;
}

.sidebar {
    float: right;
    width: 180px;
    background: #000;
    border: 3px groove yellow;
    padding: 10px;
    margin-left: 20px;
}

.main {
    overflow: hidden;
}

.price-box {
    background: #330000;
    border: 2px solid red;
    padding: 10px;
    margin-top: 10px;
}

.footer {
    margin-top: 30px;
    text-align: center;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>ADVERTISE YOUR WEBSITE!!!</h1>

<marquee scrollamount="10">
⭐ REACH THOUSANDS OF INTERNET USERS DAILY! ⭐
</marquee>

<div class="main">

<div class="sidebar">
    <h3>AD RATES</h3>

    <div class="price-box">
        Banner Ad<br>
        $15/week
    </div>

    <div class="price-box">
        Sidebar Button<br>
        $8/week
    </div>

    <div class="price-box">
        Front Page Sponsor<br>
        $40/week
    </div>

    <br>

    <img src="https://web.archive.org/web/20091027075640/http://geocities.com/clipart/pbi/buttons/new2.gif">

</div>

<div class="form-box">

<h2>Submit Your Advertisement</h2>

<form>

<label>Your Name:</label>
<input type="text">

<label>Email Address:</label>
<input type="text">

<label>Website URL:</label>
<input type="text" value="http://">

<label>Advertisement Type:</label>
<select>
    <option>Banner Ad</option>
    <option>Sidebar Button</option>
    <option>Front Page Sponsor</option>
</select>

<label>Ad Description:</label>
<textarea>
Tell us about your cool website!!!
</textarea>

<label>Upload Banner:</label>
<input type="file">

<button class="submit-btn">
SUBMIT AD!!!
</button>

</form>

</div>

</div>

<hr>

<center>
<img src="https://web.archive.org/web/20091027105748/http://geocities.com/clipart/pbi/buttons/emailme.gif">
<img src="https://web.archive.org/web/20091027145454/http://geocities.com/clipart/pbi/buttons/browser2.gif">
</center>

<div class="footer">
Best viewed in Netscape Navigator • Webmaster: admin@coolsite.com
<br>
© 1999 CoolSite Advertising Network
</div>

</div>

</body>
</html>
