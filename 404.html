<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>404 - Druidcdp.net</title>

  <link rel="icon" href="/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: white;
      font-family: Roboto;
      text-align: center;
      padding-top: 40px;
    }

    img {
      width: 25%;
      height: auto;
      margin-bottom: 20px;
    }

    a {
      color: #EDAD0B;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    input {
      width: 60%;
      padding: 10px;
      background: #2a2a2a;
      border: 2px solid #EDAD0B;
      color: white;
      font-family: Roboto;
    }

    .dropdown {
      width: 60%;
      margin: auto;
      background: #1e1e1e;
      border: 2px solid #EDAD0B;
      text-align: left;
      display: none;
      position: relative;
    }

    .item {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    .item:hover {
      background: #2a2a2a;
    }

    .small {
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <img src="/404.png">

  <p>I searched every inch, but I can't seem to find what you're looking for!</p>

  <p class="small">Would you like to search for it?</p>

  <p class="small">(Note that hidden pages may not show)</p>

  <p><a href="/what/">Hidden pages?</a></p>

  <!-- search -->
  <input type="text" id="searchBox" placeholder="Search the site..." oninput="showSuggestions()">

  <div id="dropdown" class="dropdown"></div>

  <p><a href="/">← Return to main page</a></p>

  <script>
    const pages = [
      "zero",
      "flash-games",
      "channels",
      "tools",
      "newsletter",
      "misc",
      "faq"
    ];

    function showSuggestions() {
      let input = document.getElementById("searchBox").value.toLowerCase();
      let dropdown = document.getElementById("dropdown");

      dropdown.innerHTML = "";

      if (input === "") {
        dropdown.style.display = "none";
        return;
      }

      let matches = pages.filter(p => p.includes(input));

      if (matches.length === 0) {
        dropdown.style.display = "none";
        return;
      }

      matches.forEach(match => {
        let div = document.createElement("div");
        div.className = "item";
        div.innerText = match;
        div.onclick = () => {
          window.location.href = "/" + match;
        };
        dropdown.appendChild(div);
      });

      dropdown.style.display = "block";
    }
  </script>

</body>

</html>
