<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>404 - Druidcdp.net</title>

  <link rel="icon" href="/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: white;
      font-family: Roboto;
      text-align: center;
    }

    #container {
      width: 700px;
      margin: auto;
      margin-top: 40px;
      background: #1e1e1e;
      border: 4px solid #EDAD0B;
      padding: 30px;
    }

    img {
      width: 25%;
      height: auto;
      margin-bottom: 20px;
    }

    a {
      color: #EDAD0B;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    input {
      width: 60%;
      padding: 10px;
      margin-top: 15px;
      background: #2a2a2a;
      border: 2px solid #EDAD0B;
      color: white;
      font-family: Roboto;
    }

    button {
      padding: 10px 15px;
      margin-left: 5px;
      background: #2a2a2a;
      border: 2px solid #EDAD0B;
      color: white;
      font-family: Roboto;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a3a;
    }

    .small {
      opacity: 0.7;
      font-size: 14px;
    }

    #home {
      margin-top: 25px;
      display: block;
    }
  </style>
</head>

<body>

  <div id="container">

    <img src="/404.png">

    <p>
      I searched every inch, but I can't seem to find what you're looking for!
    </p>

    <p>
      Would you like to search for it?
    </p>

    <p class="small">
      (Note that hidden pages may not show)
    </p>

    <p>
      <a href="/what/">Hidden pages?</a>
    </p>

    <!-- search bar -->
    <input type="text" id="searchBox" placeholder="Search the site...">

    <button onclick="searchSite()">
      Search
    </button>

    <!-- back home -->
    <a id="home" href="/">
      ← Return to main page
    </a>

  </div>

  <script>
    function searchSite() {
      let query = document.getElementById("searchBox").value;

      if (query.trim() !== "") {
        window.location.href =
          "https://www.google.com/search?q=site:druidcdp.net+" +
          encodeURIComponent(query);
      }
    }
  </script>

</body>

</html>
