<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Druidcdp.net</title>

  <meta name="title" content="Welcome to Druidcdp.net!">
  <meta name="description" content="Rolls off the tongue huh? Play games, use tools and explore projects!">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Welcome to Druidcdp.net!">
  <meta property="og:description" content="Rolls off the tongue huh? Play games, use tools and explore projects!">
  <meta property="og:url" content="https://www.druidcdp.net">

  <meta name="theme-color" content="#EDAD0B">

  <style>
    body {
      background: #111;
      color: white;
      font-family: Roboto;
    }

    #container {
      width: 700px;
      margin: auto;
      margin-top: 20px;
      background: #1e1e1e;
      border: 4px solid #EDAD0B;
      padding: 20px;
    }

    #grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      display: block;
      padding: 15px;
      background: #2a2a2a;
      color: white;
      text-decoration: none;
      text-align: center;
      border-left: 5px solid #EDAD0B;
      position: relative;
    }

    .btn:hover {
      background: #3a3a3a;
    }

    .disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    .disabled img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
    }

    .disabled span {
      position: relative;
      z-index: 2;
    }

    /* ad OUTSIDE container */
    #ad {
      width: 700px;
      margin: 15px auto 30px auto;
      text-align: center;
    }

    #ad img {
      width: 100%;
      max-width: 650px;
    }
  </style>
</head>

<body>

  <!-- licensing text -->
  <center>
    <span style="font-family:Roboto;">
      EVERYTHING SHOWN CREATED BY JONATHAN CD P (AKA: Druid/Druidwastaken) IS UNDER THE CREATIVE COMMONS 0 LICENSE.<br>
      CREDIT IS NOT LEGALLY REQUIRED, BUT PLEASE DO IF YOU WISH TO BE RESPECTFUL.
    </span>
  </center>

  <!-- main box -->
  <div id="container">

    <div id="grid">

      <div class="btn disabled">
        <img src="cautiontape.png">
        <span>Zero</span>
      </div>

      <a class="btn" href="/flash-games">Flash Games</a>

      <a class="btn" href="/channels">Channels</a>

      <div class="btn disabled">
        <img src="cautiontape.png">
        <span>Tools</span>
      </div>

      <a class="btn" href="/newsletter">Newsletter</a>

      <div class="btn disabled">
        <img src="cautiontape.png">
        <span>Misc</span>
      </div>

    </div>

  </div>

  <!-- fake ad UNDER the box -->
  <div id="ad">
    <img src="fakead.png">
  </div>

</body>
</html>
