<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yoylese Translator</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 40px;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  textarea {
    width: 300px;
    height: 200px;
    padding: 10px;
    font-size: 16px;
    resize: none;
  }
</style>
</head>

<body>

<h1>Yoylese Translator</h1>

<div class="container">
  <textarea id="box1" placeholder="Type English text..."></textarea>
  <textarea id="box2" placeholder="Paste Yoylese text..."></textarea>
</div>

<script>
const box1 = document.getElementById("box1");
const box2 = document.getElementById("box2");

let lock = false;

// Your custom alphabet
const map = {
  a: "⊸",
  b: "𐊀",
  c: "⛛",
  d: "Z",
  e: "]",
  f: "И",
  g: "ᖚ",
  h: "そ",
  i: "𞋸",
  j: "𐒄",
  k: "ᖘ",
  l: "–",
  m: "[",
  n: "⅄",
  o: "Y",
  p: "π",
  q: "ꘜ",
  r: "𝄑",
  s: "⋈",
  t: "ᖗ",
  u: "⊣",
  v: "⧖",
  w: "ⵏ",
  x: "𝄩",
  y: "ᖙ",
  z: "⨀"
};

// Build reverse map automatically
const reverseMap = {};
for (const key in map) {
  reverseMap[map[key]] = key;
}

// Encode function
function encode(str) {
  str = str.toLowerCase();
  return [...str].map(c => map[c] ?? c).join("");
}

// Decode function
function decode(str) {
  return [...str].map(c => reverseMap[c] ?? c).join("");
}

// box1 → box2
box1.addEventListener("input", () => {
  if (lock) return;
  lock = true;
  box2.value = encode(box1.value);
  lock = false;
});

// box2 → box1
box2.addEventListener("input", () => {
  if (lock) return;
  lock = true;
  box1.value = decode(box2.value);
  lock = false;
});
</script>

</body>
</html>
