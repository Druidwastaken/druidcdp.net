<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yoylese Translator</title>
<link rel="icon" href="/icon.png">

<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: black;
    color: #EDAD0B;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 900px;
  }

  h1 {
    text-align: center;
    margin-bottom: 40px;
    font-size: 2.5rem;
    letter-spacing: 2px;
  }

  .box-container {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  textarea {
    flex: 1;
    min-width: 300px;
    height: 350px;
    padding: 15px;
    font-size: 16px;
    resize: none;

    background: transparent;
    color: #EDAD0B;
    border: 2px solid #EDAD0B;
    border-radius: 12px;

    outline: none;
    transition: 0.2s;
  }

  textarea:focus {
    background: rgba(237, 173, 11, 0.05);
    transform: translateY(-2px);
  }

  textarea::placeholder {
    color: #777;
  }

  /* mobile fix */
  @media (max-width: 700px) {
    .box-container {
      flex-direction: column;
    }

    textarea {
      min-width: unset;
      width: 100%;
    }
  }
</style>
</head>

<body>

<div class="container">

  <h1>YOYLESE TRANSLATOR</h1>

  <div class="box-container">
    <textarea id="box1" placeholder="Type English text..."></textarea>
    <textarea id="box2" placeholder="Paste Yoylese text..."></textarea>
  </div>

</div>

<script>
const box1 = document.getElementById("box1");
const box2 = document.getElementById("box2");

let lock = false;

// Your custom alphabet
const map = {
  a: "⊸",
  b: "𐊀",
  c: "⛛",
  d: "Z",
  e: "]",
  f: "И",
  g: "ᖚ",
  h: "そ",
  i: "𞋸",
  j: "𐒄",
  k: "ᖘ",
  l: "–",
  m: "[",
  n: "⅄",
  o: "Y",
  p: "π",
  q: "ꘜ",
  r: "𝄑",
  s: "⋈",
  t: "ᖗ",
  u: "⊣",
  v: "⧖",
  w: "ⵏ",
  x: "𝄩",
  y: "ᖙ",
  z: "⨀"
};

// Reverse map
const reverseMap = {};
for (const key in map) {
  reverseMap[map[key]] = key;
}

function encode(str) {
  str = str.toLowerCase();
  return [...str].map(c => map[c] ?? c).join("");
}

function decode(str) {
  return [...str].map(c => reverseMap[c] ?? c).join("");
}

box1.addEventListener("input", () => {
  if (lock) return;
  lock = true;
  box2.value = encode(box1.value);
  lock = false;
});

box2.addEventListener("input", () => {
  if (lock) return;
  lock = true;
  box1.value = decode(box2.value);
  lock = false;
});
</script>

</body>
</html>
