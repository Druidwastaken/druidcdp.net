<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="icon.png">
<title>VAULT</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
}

h1 {
    margin-bottom: 40px;
    letter-spacing: 8px;
    font-weight: normal;
}

.square {
    width: 64px;
    height: 64px;
    border: 2px solid #666;
    background: #1a1a1a;
    box-sizing: border-box;
}

#codeInput {
    text-align: center;
    font-size: 18px;
    color: white;
    outline: none;
}

#submitSquare {
    margin-top: 10px;
    cursor: pointer;
    transition: background 0.15s;
}

#message {
    position: fixed;
    bottom: 40px;
    text-align: center;
    font-size: 18px;
    letter-spacing: 2px;
}
</style>
</head>
<body>

<h1>VAULT</h1>

<input
    class="square"
    id="codeInput"
    type="text"
    autocomplete="off"
    spellcheck="false">

<div
    class="square"
    id="submitSquare"
    onclick="checkCode()">
</div>

<div id="message"></div>

<audio id="audioPlayer"></audio>

<script>
function checkCode() {
    const code = document.getElementById("codeInput").value.trim();
    const message = document.getElementById("message");
    const audio = document.getElementById("audioPlayer");

    message.textContent = "";

    switch (code) {

        case "PATHETIC":
            window.location.href = "https://druidcdp.net/vault/doors/";
            break;

        case "tellmemore":
            window.location.href = "https://druidcdp.net/vault/whatelsetolearn/";
            break;

        case "TEXLIXMG":
        case "4TEXLIXMG":
            message.textContent = "YOUR ATTEMPTS AMUSE ME";
            break;

        case "tier3":
            audio.src = "/p2.wav";
            audio.play();
            break;

        case "cjohnson":
            audio.src = "/p1.wav";
            audio.play();
            break;

        default:
            message.textContent = "ACCESS DENIED";
    }
}

document.getElementById("codeInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});
</script>

</body>
</html>
