<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="/icon.png">
  <title>Druidcdp.net - Games</title>

  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: black;
      color: #EDAD0B;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 1rem;
      letter-spacing: 2px;
    }

    .section {
      margin-bottom: 30px;
    }

    button {
      width: 100%;
      padding: 18px;
      background: transparent;
      border: 2px solid #EDAD0B;
      border-radius: 12px;
      color: #EDAD0B;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: rgba(237, 173, 11, 0.1);
      transform: translateY(-2px);
    }

    .description {
      margin-top: 10px;
      color: #cccccc;
      line-height: 1.5;
      padding-left: 5px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>FLASH GAMES</h1>
    <h2>All of these require a Flash Player to play.</h2>

    <div class="section">
  <button onclick="window.location.href='flash-games/paper-launcher'">
    Paper Launcher
  </button>

  <div class="description">
    Play as Printer, press space and aim with your mouse to lauch yourself. as you go higher, more and more and more obstacles try to prevent you from getting to the top! (Although there is no top) 
  </div>
</div>

  </div>
</body>
</html>
